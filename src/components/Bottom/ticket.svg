<svg width="420" height="150" viewBox="0 0 420 150" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gradient -->
    <linearGradient id="mainGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a8a"/>
      <stop offset="100%" stop-color="#e53935"/>
    </linearGradient>

    <!-- Mask for ticket cuts -->
    <mask id="ticketMask">
      <rect x="20" y="30" width="280" height="90" rx="20" fill="white"/>
      <circle cx="20" cy="75" r="14" fill="black"/>
      <circle cx="300" cy="75" r="14" fill="black"/>
    </mask>
  </defs>

  <!-- Ticket -->
  <rect x="20" y="30" width="280" height="90" rx="20"
        fill="url(#mainGrad)" mask="url(#ticketMask)"/>

  <!-- Inner border -->
  <rect x="35" y="45" width="250" height="60" rx="14"
        fill="none" stroke="#ffffffaa" stroke-width="1.5"/>

  <!-- TEXT -->
  <text x="160" y="70" text-anchor="middle"
        fill="white" font-size="18"
        font-family="Poppins, Arial"
        font-weight="700">
    The Magical
  </text>

  <text x="160" y="95" text-anchor="middle"
        fill="white" font-size="18"
        font-family="Poppins, Arial"
        font-weight="700">
    Ticket
  </text>

  <!-- Right section -->
  <rect x="300" y="30" width="100" height="90" rx="15"
        fill="#f0625d"/>

  <!-- Dotted divider -->
  <line x1="300" y1="30" x2="300" y2="120"
        stroke="#ffffffaa"
        stroke-width="2"
        stroke-dasharray="5 5"/>

  <!-- HORIZONTAL BARCODE -->
  <g fill="white">
    <rect x="325" y="45" width="60" height="2"/>
    <rect x="325" y="50" width="60" height="4"/>
    <rect x="325" y="58" width="60" height="2"/>
    <rect x="325" y="63" width="60" height="6"/>
    <rect x="325" y="72" width="60" height="3"/>
    <rect x="325" y="77" width="60" height="2"/>
    <rect x="325" y="82" width="60" height="5"/>
    <rect x="325" y="90" width="60" height="2"/>
    <rect x="325" y="95" width="60" height="4"/>
  </g>

</svg>
